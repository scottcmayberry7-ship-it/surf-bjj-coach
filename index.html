// ── HELPERS ───────────────────────────────────────────────────────────────────
function daysLeft()   { return Math.max(0,Math.ceil((SURGERY_DATE-new Date())/86400000)); }
function weeksLeft()  { return Math.ceil(daysLeft()/7); }
function todayKey(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function todayLabel() { return new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'}).toUpperCase(); }
function sleepDec(h,m){ return +(h+m/60).toFixed(2); }
function sleepStr(h,m){ return m>0?`${h}h ${m}m`:`${h}h`; }
function clamp(v,a,b) { return Math.min(b,Math.max(a,v)); }
function timeNow()    { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
function durStr(ms)   { const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000); return `${h}h ${String(m).padStart(2,'0')}m`; }
function garminBand(s){
  if(!s&&s!==0) return {label:'—',color:'#475569'};
  if(s>=90) return {label:'Excellent',color:'#22c55e'};
  if(s>=75) return {label:'Good',color:'#4ade80'};
  if(s>=60) return {label:'Fair',color:'#f59e0b'};
  if(s>=40) return {label:'Poor',color:'#f97316'};
  return {label:'Very poor',color:'#ef4444'};
}
function bbColor(v){ const n=parseInt(v)||0; return n>=70?'#22c55e':n>=40?'#f59e0b':'#ef4444'; }
function d(tag,css=''){ const e=document.createElement(tag); if(css) e.style.cssText=css; return e; }
function mkCard(ac,lbl){ const c=d('div','background:#0b1120;border:1px solid #111827;border-radius:14px;padding:20px;margin-bottom:12px;'); const l=d('div',`font-size:10px;color:${ac};font-weight:700;letter-spacing:.2em;margin-bottom:14px;`); l.textContent=lbl; c.appendChild(l); return c; }

// ── TRAINING STORAGE ──────────────────────────────────────────────────────────
function loadLog(){
  try{
    const stored=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
    if(!stored||stored.length===0){
      localStorage.setItem(STORAGE_KEY,JSON.stringify(SEED_LOG));
      return JSON.parse(JSON.stringify(SEED_LOG));
    }
    // Seed entries always win for their own dates — preserves accurate historical data
    // User entries for dates NOT in seed are kept as-is
    const seedDates=new Set(SEED_LOG.map(e=>e.date));
    const userOnly=stored.filter(e=>!seedDates.has(e.date));
    const merged=[...SEED_LOG,...userOnly].sort((a,b)=>a.date.localeCompare(b.date));
    localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
    return merged;
  }catch{ return JSON.parse(JSON.stringify(SEED_LOG)); }
}
function saveLog(){
  try{
    // When saving, preserve seed entries — only overwrite seed dates if it's today's live check-in
    const today=todayKey();
    const seedDates=new Set(SEED_LOG.map(e=>e.date));
    const toSave=S.log.map(e=>{
      // If this is a seed date AND not today, always keep the seed version
      if(seedDates.has(e.date)&&e.date!==today){
        return SEED_LOG.find(s=>s.date===e.date)||e;
      }
      return e;
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify(toSave));
  }catch{}
}

// ── SLIDER + STEPPER ──────────────────────────────────────────────────────────
function mkSliderStepper(val,min,max,color,cb,display){
  const w=d('div','margin-bottom:6px;');
  const row=d('div','display:flex;align-items:center;gap:10px;margin-bottom:10px;');
  const dn=d('button',''); dn.className='step-btn'; dn.textContent='−'; dn.onclick=()=>cb(clamp(val-1,min,max));
  const vl=d('div','flex:1;text-align:center;font-size:18px;font-weight:700;'); vl.style.color=color; vl.textContent=display;
  const up=d('button',''); up.className='step-btn'; up.textContent='+'; up.onclick=()=>cb(clamp(val+1,min,max));
  row.appendChild(dn); row.appendChild(vl); row.appendChild(up); w.appendChild(row);
  const inp=document.createElement('input'); inp.type='range'; inp.min=min; inp.max=max; inp.value=val; inp.style.color=color;
  function upd(){ const p=((inp.value-min)/(max-min))*100; inp.style.background=`linear-gradient(to right,${color} ${p}%,#1f2937 ${p}%)`; } upd();
  inp.addEventListener('input',e=>{cb(Number(e.target.value));upd();}); w.appendChild(inp);
  const ll=d('div','display:flex;justify-content:space-between;font-size:9px;color:#334155;margin-top:2px;');
  ll.innerHTML=`<span>${min}</span><span>${max}</span>`; w.appendChild(ll); return w;
}
function mkStepW(lbl,val,min,max,color,cb){
  const w=d('div','display:flex;flex-direction:column;align-items:center;gap:6px;');
  const lb=d('div','font-size:9px;color:#475569;letter-spacing:.1em;'); lb.textContent=lbl.toUpperCase(); w.appendChild(lb);
  const row=d('div','display:flex;align-items:center;gap:8px;');
  const dn=d('button',''); dn.className='step-btn'; dn.textContent='−'; dn.onclick=()=>cb(val<=min?min:val-1);
  const ni=document.createElement('input'); ni.type='number'; ni.min=min; ni.max=max; ni.value=val; ni.className='num-inp';
  ni.style.color=color; ni.style.borderColor=color+'50'; ni.addEventListener('change',e=>cb(clamp(parseInt(e.target.value)||0,min,max)));
  const up=d('button',''); up.className='step-btn'; up.textContent='+'; up.onclick=()=>cb(val>=max?max:val+1);
  row.appendChild(dn); row.appendChild(ni); row.appendChild(up); w.appendChild(row); return w;
}

    e.innerHTML=`<div style="font-size:36px;margin-bottom:12px;">📋</div><p style="color:#4b5563;font-size:14px;margin-bottom:16px;">No plan yet — complete your check-in first.</p>`;

  }
  const rc=RCOL[p.readiness]||'#475569',rb=RBG[p.readiness]||'#0b1120',dl=daysLeft();

  const totEx=allB.reduce((n,b)=>n+(b.exercises?.length||0),0);
  const done=Object.values(S.ticked).filter(Boolean).length;
  const prog=totEx>0?Math.round((done/totEx)*100):0;
  // Banner
  const ban=d('div',`background:${rb};border:1px solid ${rc}40;border-radius:14px;padding:16px 18px;margin-bottom:14px;display:flex;gap:14px;align-items:flex-start;`);

  ban.appendChild(sc); ban.appendChild(bt); w.appendChild(ban);
  // Coach
  const cn=d('div','background:#0b1120;border-left:3px solid #7c3aed;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:12px;');
  cn.innerHTML=`<div style="font-size:9px;color:#7c3aed;letter-spacing:.2em;font-weight:700;margin-bottom:4px;">COACH</div><p style="font-size:12px;color:#9ca3af;line-height:1.6;margin:0;">${p.coach_note}</p>`;
  w.appendChild(cn);
  // 2col
  const tc=d('div','display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;');
  const s1=d('div','background:#0b1120;border:1px solid #111827;border-radius:10px;padding:12px;');

  const s2=d('div','background:#1a0808;border:1px solid #7f1d1d;border-radius:10px;padding:12px;');

  // ── WARM-UP — tickable items ──

    // Parse warmup into numbered items
    const wuItems=p.warmup.split(/\d+\.\s+/).filter(Boolean).length>1
      ? p.warmup.split(/\d+\.\s+/).filter(Boolean)
      : p.warmup.split(/[.\n]+/).map(s=>s.trim()).filter(s=>s.length>4);

      const chk2=d('div',`width:18px;height:18px;border-radius:3px;flex-shrink:0;border:1.5px solid ${done2?'#22c55e':'#1f2937'};background:${done2?'#22c55e':'transparent'};display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;`);

      wrow.appendChild(chk2); wrow.appendChild(wtxt);

  (p.blocks||[]).forEach((blk,bi)=>w.appendChild(mkBlock(blk,`b${bi}`,'#22d3ee',`BLOCK ${bi+1} · ${(blk.title||'').toUpperCase()}`,'#0b1120','#111827',false,`block_${bi}`)));

      inp.addEventListener('click',e2=>e2.stopPropagation());
      inp.addEventListener('input',e2=>{e2.stopPropagation();S[f.key]=e2.target.value;S.log=S.log.map(l=>l.date===todayKey()?{...l,[f.key]:e2.target.value}:l);saveLog();if(S.plan)savePlan(S.plan);});

    const overrideBtn=d('button','width:100%;background:#0a0f1a;border:1px solid #f59e0b40;border-radius:8px;padding:10px;color:#f59e0b;font-size:12px;font-weight:700;');

  w.appendChild(condCard);

  if(p.cooldown){

  }

  // ── CUSTOM EXERCISES (additional work — always visible) ──
  const cxCard=d('div','background:#0b1120;border:1px solid #1f2937;border-radius:12px;padding:14px 16px;margin-bottom:10px;');

  cxHdr.innerHTML=`<div><div style="font-size:10px;color:#22d3ee;letter-spacing:.2em;font-weight:700;">ADDITIONAL WORK / EXTRA REHAB</div><div style="font-size:10px;color:#374151;margin-top:2px;">Add anything extra — second session, extra sets, rehab done later</div></div>`;
  const addCxBtn=d('button','background:#22d3ee18;border:1px solid #22d3ee40;border-radius:8px;padding:6px 12px;color:#22d3ee;font-size:11px;font-weight:700;flex-shrink:0;');
  addCxBtn.textContent='+ Add'; addCxBtn.onclick=()=>{ S.customExercises=[...S.customExercises,{name:'',sets:'',load:'',notes:''}]; if(S.plan)savePlan(S.plan); render(); };
  cxHdr.appendChild(addCxBtn); cxCard.appendChild(cxHdr);
  if(S.customExercises.length===0){
    const cxEmpty=d('div','font-size:11px;color:#374151;padding:4px 0;'); cxEmpty.textContent='Tap + Add for extra exercises, second rehab session, or anything done later in the day.'; cxCard.appendChild(cxEmpty);
  }
  S.customExercises.forEach((ex,i)=>{
    const cxRow=d('div','background:#090e1a;border:1px solid #1f2937;border-radius:8px;padding:10px;margin-bottom:6px;position:relative;');
    // Name row
    const nr=d('div','display:flex;gap:6px;margin-bottom:6px;');
    const ni=document.createElement('input'); ni.type='text'; ni.placeholder='Exercise name...'; ni.value=ex.name||'';
    ni.style.cssText='flex:1;background:#070b12;border:1px solid #1f2937;border-radius:6px;padding:7px 10px;color:#e2e8f0;font-size:13px;font-weight:700;';
    ni.addEventListener('click',e2=>e2.stopPropagation()); ni.addEventListener('input',e2=>{e2.stopPropagation();ex.name=e2.target.value;if(S.plan)savePlan(S.plan);});
    const delCx=d('button','background:transparent;border:none;color:#374151;font-size:16px;padding:4px 6px;flex-shrink:0;');
    delCx.textContent='✕'; delCx.onclick=()=>{ S.customExercises.splice(i,1); if(S.plan)savePlan(S.plan); render(); };
    nr.appendChild(ni); nr.appendChild(delCx); cxRow.appendChild(nr);
    // Sets/Load/Notes row
    const sr=d('div','display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;');
    [{key:'sets',ph:'Sets/reps e.g. 3×8'},{key:'load',ph:'Load e.g. 2kg / band / BW'}].forEach(f=>{
      const inp=document.createElement('input'); inp.type='text'; inp.placeholder=f.ph; inp.value=ex[f.key]||'';
      inp.style.cssText='width:100%;background:#070b12;border:1px solid #1f2937;border-radius:6px;padding:7px 10px;color:#e2e8f0;font-size:12px;';
      inp.addEventListener('click',e2=>e2.stopPropagation()); inp.addEventListener('input',e2=>{e2.stopPropagation();ex[f.key]=e2.target.value;if(S.plan)savePlan(S.plan);});
      sr.appendChild(inp);
    });
    cxRow.appendChild(sr);
    const noteInp=document.createElement('input'); noteInp.type='text'; noteInp.placeholder='Notes — pain level, how it felt...'; noteInp.value=ex.notes||'';
    noteInp.style.cssText='width:100%;background:#070b12;border:1px solid #1f2937;border-radius:6px;padding:7px 10px;color:#e2e8f0;font-size:11px;';
    noteInp.addEventListener('click',e2=>e2.stopPropagation()); noteInp.addEventListener('input',e2=>{e2.stopPropagation();ex.notes=e2.target.value;if(S.plan)savePlan(S.plan);});
    cxRow.appendChild(noteInp); cxCard.appendChild(cxRow);
  });
  w.appendChild(cxCard);

  // Post-session notes
  const psnCard=d('div','background:#0d1117;border:1px solid #7c3aed40;border-radius:12px;padding:16px;margin-bottom:14px;');
  psnCard.innerHTML=`<div style="font-size:10px;color:#7c3aed;letter-spacing:.2em;font-weight:700;margin-bottom:4px;">POST-SESSION NOTES</div><div style="font-size:11px;color:#475569;margin-bottom:6px;line-height:1.5;">How did it go? Pain, fatigue, loads — feeds into tomorrow's plan.</div>`;
  const psnTa=document.createElement('textarea'); psnTa.className='sn-ta';
  psnTa.placeholder='e.g. Elbow 2/10 on rows, squats strong at 70kg, right shoulder clicked, energy dropped mid-session...';
  psnTa.value=S.postSessionNote||'';
  psnTa.addEventListener('input',e=>{ S.postSessionNote=e.target.value; S.log=S.log.map(l=>l.date===todayKey()?{...l,postSessionNote:e.target.value}:l); saveLog(); if(S.plan)savePlan(S.plan); });
  psnCard.appendChild(psnTa); w.appendChild(psnCard);

  const cb=d('button',`width:100%;background:${S.sessionDone?'#052e16':'linear-gradient(135deg,#15803d,#0f766e)'};border:${S.sessionDone?'1px solid #14532d':'none'};border-radius:12px;padding:15px;color:${S.sessionDone?'#4ade80':'#fff'};font-size:14px;font-weight:700;margin-bottom:8px;`);
  cb.textContent=S.sessionDone?'✓  Session logged':'Mark session complete';
  if(!S.sessionDone) cb.onclick=markDone; w.appendChild(cb);

  // Post-completion buttons
  if(S.sessionDone){
    const editBtn=d('button','width:100%;background:#0b1120;border:1px solid #334155;border-radius:10px;padding:12px;color:#94a3b8;font-size:12px;font-weight:700;margin-bottom:8px;');
    editBtn.innerHTML='✎  Edit / Add to Session';
    editBtn.onclick=()=>{ S.sessionDone=false; render(); };
    w.appendChild(editBtn);

    const fbBtn=d('button',`width:100%;background:${S.feedbackLoading?'#090e1a':'#0d1117'};border:1px solid #7c3aed60;border-radius:12px;padding:15px;color:${S.feedbackLoading?'#374151':'#a78bfa'};font-size:14px;font-weight:700;margin-bottom:8px;`);
    fbBtn.textContent=S.feedbackLoading?'⏳  Analysing session...':'📊  Session Feedback & Next Session Preview';
    if(!S.feedbackLoading) fbBtn.onclick=genFeedback;
    w.appendChild(fbBtn);

    if(S.feedback){
      const fbPreview=d('div','background:#0d1117;border:1px solid #7c3aed40;border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;');

      fbPreview.onclick=()=>{S.showFeedbackModal=true;render();};
      w.appendChild(fbPreview);
    }
  }
  return w;
}

function mkBlock(blk,prefix,accent,hdr,bg,border,isElbow,blockKey){
  const w=d('div',`background:${bg};border:1px solid ${border};border-radius:12px;margin-bottom:10px;overflow:hidden;`);
  const h=d('div',`padding:11px 16px;border-bottom:1px solid ${isElbow?'#052e16':'#0d1117'};display:flex;justify-content:space-between;align-items:center;`);
  const ht=d('span',`font-size:10px;font-weight:700;color:${accent};letter-spacing:.15em;`); ht.textContent=hdr; h.appendChild(ht);
  if(isElbow){const ns=d('span','font-size:9px;color:#14532d;letter-spacing:.1em;');ns.textContent='NEVER SKIP';h.appendChild(ns);}
  w.appendChild(h);
  (blk.exercises||[]).forEach((ex,ei)=>{
    const key=`${prefix}e${ei}`,done=!!S.ticked[key];
    const row=d('div',`padding:13px 16px;border-bottom:1px solid ${isElbow?'#052e16':'#0d1117'};cursor:pointer;display:flex;gap:12px;align-items:flex-start;background:${done?(isElbow?'#052e16':'#071a07'):'transparent'};transition:background .2s;`);
    const chk=d('div',`width:20px;height:20px;border-radius:4px;flex-shrink:0;margin-top:2px;border:1.5px solid ${done?'#22c55e':'#1f2937'};background:${done?'#22c55e':'transparent'};display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;`);
    chk.textContent=done?'✓':'';
    const tx=d('div',`flex:1;opacity:${done?.45:1};`);
    tx.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:3px;"><span style="font-size:13px;font-weight:700;color:#f1f5f9;">${ex.name}</span><span style="font-size:10px;color:${accent};background:${accent}14;padding:1px 7px;border-radius:4px;">${ex.sets}</span>${ex.load?`<span style="font-size:10px;color:#f59e0b;background:#f59e0b12;padding:1px 7px;border-radius:4px;">${ex.load}</span>`:''}</div>${ex.notes?`<div style="font-size:11px;color:${isElbow?'#4ade8060':'#4b5563'};line-height:1.5;">${ex.notes}</div>`:''}`;
    row.appendChild(chk); row.appendChild(tx); row.onclick=()=>{S.ticked[key]=!S.ticked[key];if(S.plan)savePlan(S.plan);render();}; w.appendChild(row);
  });
  if(blockKey){
    const nw=d('div',`padding:12px 16px;background:${isElbow?'#040d04':'#090e1a'};border-top:1px solid ${isElbow?'#052e16':'#111827'};`);
    const nl=d('div',`font-size:9px;color:${isElbow?'#14532d':accent+'80'};letter-spacing:.15em;font-weight:700;margin-bottom:6px;`); nl.textContent='NOTES'; nw.appendChild(nl);
    const nta=document.createElement('textarea'); nta.className='sn-ta'; nta.style.minHeight='48px'; nta.style.fontSize='11px';
    nta.placeholder=isElbow?'Pain level, which movements aggravated...':'Loads, how it felt, any pain...';
    nta.value=S.blockNotes[blockKey]||'';
    nta.addEventListener('input',e=>{ S.blockNotes[blockKey]=e.target.value; S.log=S.log.map(l=>l.date===todayKey()?{...l,blockNotes:{...(l.blockNotes||{}),[blockKey]:e.target.value}}:l); saveLog(); });
    nw.appendChild(nta); w.appendChild(nw);
  }
  return w;
}

// ── NUTRITION ─────────────────────────────────────────────────────────────────
function mkNutrition(){
  const w=d('div','');

  // ── AUTO-REFRESH TO TODAY ──
  // If the date has changed since S.nut was loaded, reload from storage for today
  const today=todayKey();
  if(S.nutDate!==today){
    S.nutDate=today;
    S.nut=loadNut(today);
    S.nutFeedback=null;
  }

  const nut=S.nut;
  const ptarget=proteinTarget();
  const totalP=Math.round(nut.foods.reduce((s,f)=>s+f.protein,0));
  const totalK=Math.round(nut.foods.reduce((s,f)=>s+f.calories,0));
  const pPct=Math.min(100,Math.round((totalP/ptarget)*100));
  const remaining=Math.max(0,ptarget-totalP);

  // Header
  const hdr=d('div','margin-bottom:20px;');
  const hdrRow=d('div','display:flex;justify-content:space-between;align-items:flex-start;');
  const hdrTxt=d('div','flex:1;');
  hdrTxt.innerHTML=`<p style="font-size:10px;letter-spacing:.25em;color:#374151;margin-bottom:6px;font-family:monospace;">${todayLabel()}</p><h2 style="font-size:24px;font-weight:700;">Nutrition</h2><p style="font-size:11px;color:#4b5563;margin-top:4px;">Carnivore · Intermittent Fasting · ${ptarget}g protein target (2g/kg)</p>`;
  const histBtn=d('button','background:#0b1120;border:1px solid #1f2937;border-radius:10px;padding:8px 12px;color:#94a3b8;font-size:11px;font-weight:700;white-space:nowrap;margin-top:6px;flex-shrink:0;');
  histBtn.textContent='📅 History';
  histBtn.onclick=()=>{S.showFoodHistory=true;S.foodHistoryDate=null;render();};
  hdrRow.appendChild(hdrTxt); hdrRow.appendChild(histBtn);
  hdr.appendChild(hdrRow); w.appendChild(hdr);

  // FASTING WINDOW
  const fc=mkCard('#f59e0b','FASTING WINDOW');
  const now=Date.now();
  if(!nut.eatStart){
    // Currently fasting
    const fastDur=nut.eatEnd?durStr(now-new Date(nut.eatEnd).getTime()):'—';
    const fi=d('div','text-align:center;padding:8px 0 16px;');
    fi.innerHTML=`<div style="font-size:11px;color:#f59e0b;letter-spacing:.1em;margin-bottom:6px;">CURRENTLY FASTING</div><div style="font-size:32px;font-weight:900;color:#f59e0b;">${fastDur}</div>${nut.eatEnd?`<div style="font-size:10px;color:#475569;margin-top:4px;">Since last ate: ${new Date(nut.eatEnd).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}</div>`:''}`;
    fc.appendChild(fi);
    const bb=d('button','width:100%;background:#f59e0b;border:none;border-radius:10px;padding:13px;color:#000;font-size:14px;font-weight:700;');
    bb.textContent='🍴  Break Fast — Start Eating';
    bb.onclick=()=>{ S.nut={...nut,eatStart:new Date().toISOString()}; saveNut(todayKey(),S.nut); render(); };
    fc.appendChild(bb);
  } else if(!nut.eatEnd){
    // Currently eating
    const eatDur=durStr(now-new Date(nut.eatStart).getTime());
    const fi=d('div','text-align:center;padding:8px 0 16px;');
    fi.innerHTML=`<div style="font-size:11px;color:#22c55e;letter-spacing:.1em;margin-bottom:6px;">EATING WINDOW OPEN</div><div style="font-size:32px;font-weight:900;color:#22c55e;">${eatDur}</div><div style="font-size:10px;color:#475569;margin-top:4px;">Started eating: ${new Date(nut.eatStart).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}</div>`;
    fc.appendChild(fi);
    const bb=d('button','width:100%;background:#22c55e;border:none;border-radius:10px;padding:13px;color:#000;font-size:14px;font-weight:700;');
    bb.textContent='⏹  Done Eating — Start Fast';
    bb.onclick=()=>{ S.nut={...nut,eatEnd:new Date().toISOString()}; saveNut(todayKey(),S.nut); render(); };
    fc.appendChild(bb);
  } else {
    // Both set — show summary
    const eatDur=durStr(new Date(nut.eatEnd)-new Date(nut.eatStart));
    const fi=d('div','text-align:center;padding:8px 0 12px;');
    fi.innerHTML=`<div style="font-size:11px;color:#22c55e;letter-spacing:.1em;margin-bottom:4px;">EATING WINDOW COMPLETE</div><div style="font-size:28px;font-weight:900;color:#22c55e;">${eatDur}</div><div style="font-size:10px;color:#475569;margin-top:4px;">${new Date(nut.eatStart).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})} → ${new Date(nut.eatEnd).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}</div>`;
    fc.appendChild(fi);
    const rst=d('button','width:100%;background:transparent;border:1px solid #1f2937;border-radius:10px;padding:10px;color:#4b5563;font-size:12px;');
    rst.textContent='Reset for today'; rst.onclick=()=>{ S.nut={...nut,eatStart:null,eatEnd:null}; saveNut(todayKey(),S.nut); render(); };
    fc.appendChild(rst);
  }
  w.appendChild(fc);

  // DAILY PROGRESS
  // Calorie target — carnivore maintenance ≈ bodyweight(kg) × 27-30 kcal
  const wt=parseFloat([...S.log].reverse().find(e=>e.weight)?.weight||'88.7');
  const maintainLow=Math.round(wt*27);
  const maintainHigh=Math.round(wt*30);
  const deficitTarget=Math.round(wt*24); // mild deficit for body recomp pre-surgery
  const kPct=Math.min(100,Math.round(totalK/maintainLow*100));
  const kStatus=totalK>=maintainLow?totalK>=maintainHigh?'above maintenance':'at maintenance':totalK>=deficitTarget?'mild deficit':'well below maintenance';
  const kCol=totalK>=maintainLow?totalK>=maintainHigh?'#f97316':'#22c55e':totalK>=deficitTarget?'#f59e0b':'#94a3b8';

  const dc=mkCard('#22d3ee','DAILY TARGETS');
  // Protein row
  const pRow=d('div','margin-bottom:12px;');
  pRow.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:12px;font-weight:700;color:#f1f5f9;">${totalP}g <span style="color:#94a3b8;font-weight:400;">protein</span></span><span style="font-size:12px;color:${pPct>=100?'#22c55e':'#94a3b8'};">${pPct>=100?'✓ TARGET MET':`${remaining}g to go`}</span></div><div style="height:6px;background:#1f2937;border-radius:3px;margin-bottom:3px;"><div style="height:100%;width:${pPct}%;background:${pPct>=100?'#22c55e':'#22d3ee'};border-radius:3px;transition:width .3s;"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;color:#374151;"><span>0g</span><span>Target: ${ptarget}g (2g/kg)</span></div>`;
  dc.appendChild(pRow);
  // Calorie row
  const kRow=d('div','margin-bottom:10px;');
  kRow.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:12px;font-weight:700;color:#f1f5f9;">${totalK} <span style="color:#94a3b8;font-weight:400;">kcal</span></span><span style="font-size:11px;color:${kCol};">${kStatus}</span></div><div style="height:6px;background:#1f2937;border-radius:3px;margin-bottom:3px;"><div style="height:100%;width:${Math.min(100,kPct)}%;background:${kCol};border-radius:3px;transition:width .3s;"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;color:#374151;"><span>Deficit: ~${deficitTarget}</span><span>Maintain: ${maintainLow}–${maintainHigh}</span></div>`;
  dc.appendChild(kRow);
  // Range legend
  const legend=d('div','display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;');
  [{label:'Pre-surgery recomp',range:`${deficitTarget}–${maintainLow}`,col:'#f59e0b'},{label:'Maintenance',range:`${maintainLow}–${maintainHigh}`,col:'#22c55e'},{label:'Surplus',range:`${maintainHigh}+`,col:'#f97316'}].forEach(t=>{
    const chip=d('div','font-size:9px;display:flex;align-items:center;gap:4px;');
    chip.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${t.col};"></span><span style="color:#475569;">${t.label}: ${t.range} kcal</span>`;
    legend.appendChild(chip);
  });
  dc.appendChild(legend);
  // Protein suggestion if remaining
  if(remaining>0&&FOODS.length>0){
    const sugg=d('div','background:#090e1a;border:1px solid #1f2937;border-radius:8px;padding:10px 12px;margin-top:6px;');
    sugg.innerHTML=`<div style="font-size:9px;color:#22d3ee;letter-spacing:.15em;font-weight:700;margin-bottom:6px;">QUICK CALC TO HIT PROTEIN</div>`;
    [{name:'Rump Steak',p:26,k:175},{name:'Ground Beef 80/20',p:26,k:254},{name:'Chicken Breast',p:31,k:165},{name:'Beef Jerky homemade',p:53,k:270}].forEach(f=>{
      const g=Math.round(remaining/f.p*100);
      const row2=d('div','display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;padding:3px 0;');
      row2.innerHTML=`<span>${f.name}</span><span style="color:#22d3ee;font-weight:700;">${g}g = ${remaining}g P</span>`;
      sugg.appendChild(row2);
    });
    dc.appendChild(sugg);
  }
  w.appendChild(dc);

  // ADD FOOD + LOG
  const flc=mkCard('#f97316','FOOD LOG');
  const btnRow2=d('div','display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;');
  const addFoodBtn=d('button','width:100%;background:linear-gradient(135deg,#c2410c,#f97316);border:none;border-radius:10px;padding:13px;color:#fff;font-size:13px;font-weight:700;');
  addFoodBtn.textContent='+ Add Food';
  addFoodBtn.onclick=()=>{ S.showAddFood=true; S.selFood=null; S.foodSearch=''; S.foodCat='All'; S.foodGrams=300; render(); };
  const photoBtn=d('button','width:100%;background:#0b1120;border:1px solid #f97316;border-radius:10px;padding:13px;color:#f97316;font-size:13px;font-weight:700;');
  photoBtn.textContent='📷 Analyse Photo';
  photoBtn.onclick=()=>{ S.showPhotoAnalysis=true; S.photoAnalysisResult=null; S.photoDesc=''; render(); };
  btnRow2.appendChild(addFoodBtn); btnRow2.appendChild(photoBtn);
  flc.appendChild(btnRow2);
  if(nut.foods.length===0){
    const empty=d('div','text-align:center;padding:16px;font-size:12px;color:#374151;'); empty.textContent='No food logged yet today.'; flc.appendChild(empty);
  } else {
    nut.foods.forEach((entry,i)=>{
      const row=d('div','display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #0d1117;position:relative;');
      row.innerHTML=`<div style="font-size:10px;color:#475569;font-family:monospace;min-width:36px;padding-top:2px;">${entry.time}</div><div style="flex:1;"><div style="font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:2px;">${entry.foodName}</div><div style="display:flex;gap:10px;font-size:11px;"><span style="color:#22d3ee;">${entry.grams}g</span><span style="color:#22c55e;font-weight:700;">+${Math.round(entry.protein)}g protein</span><span style="color:#475569;">${Math.round(entry.calories)} kcal</span></div></div>`;
      const del=d('button','background:transparent;border:none;color:#374151;font-size:14px;padding:2px 4px;');
      del.textContent='✕'; del.onclick=()=>{ const foods=nut.foods.filter((_,j)=>j!==i); S.nut={...nut,foods}; saveNut(todayKey(),S.nut); render(); };
      row.appendChild(del); flc.appendChild(row);
    });
    // Totals row
    const trow=d('div','display:flex;gap:10px;padding:10px 0;');
    trow.innerHTML=`<div style="min-width:36px;"></div><div style="flex:1;"><div style="font-size:11px;color:#94a3b8;font-weight:700;">TOTAL: <span style="color:#22c55e;">${totalP}g protein</span> · <span style="color:#475569;">${totalK} kcal</span></div></div>`;
    flc.appendChild(trow);
  }
  w.appendChild(flc);

  // SUPPLEMENTS — grouped by timing
  const sc2=mkCard('#a78bfa','DAILY SUPPLEMENTS');
  const suppNote=d('div','font-size:11px;color:#475569;margin-bottom:14px;line-height:1.5;');
  suppNote.innerHTML='Tap any supplement for full protocol detail. Tick when taken. <span style="color:#ef4444;font-weight:700;">⚠ Curcumin + Omega-3: stop April 17 (7 days before surgery)</span>';
  sc2.appendChild(suppNote);
  SUPP_GROUPS.forEach(grp=>{
    const grpSupps=SUPPS.filter(s=>s.group===grp.key);
    if(!grpSupps.length) return;
    const grpHdr=d('div',`font-size:9px;color:${grp.color};letter-spacing:.2em;font-weight:700;padding:8px 0 6px;border-bottom:1px solid #0d1117;margin-bottom:6px;`);
    grpHdr.textContent=grp.label; sc2.appendChild(grpHdr);
    grpSupps.forEach(s=>{
      const checked=!!(nut.supps&&nut.supps[s.key]);
      const isStopDate=s.key==='curcumin'||s.key==='omega3';
      const row=d('div','display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #0a0f1a;cursor:pointer;');
      const chk=d('div',`width:22px;height:22px;border-radius:5px;flex-shrink:0;border:1.5px solid ${checked?s.color:'#1f2937'};background:${checked?s.color:'transparent'};display:flex;align-items:center;justify-content:center;font-size:13px;color:#000;`);
      chk.textContent=checked?'✓':'';
      const info=d('div','flex:1;');
      info.innerHTML=`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;"><span style="font-size:12px;font-weight:700;color:#f1f5f9;">${s.name}</span>${isStopDate?'<span style="font-size:9px;color:#ef4444;background:#ef444418;padding:1px 6px;border-radius:3px;">STOP APR 17</span>':''}</div><div style="font-size:10px;color:${s.color};margin-top:1px;">${s.dose}</div>`;
      const inf=d('button','background:transparent;border:none;color:#334155;font-size:16px;padding:2px 6px;'); inf.textContent='ℹ';
      inf.onclick=e=>{ e.stopPropagation(); S.suppDetail=s; render(); };
      row.appendChild(chk); row.appendChild(info); row.appendChild(inf);
      row.onclick=()=>{ const supps={...(nut.supps||{}),[s.key]:!checked}; S.nut={...nut,supps}; saveNut(todayKey(),S.nut); render(); };
      sc2.appendChild(row);
    });
  });

  // Supplement completion count
  const suppDone=SUPPS.filter(s=>!!(nut.supps&&nut.supps[s.key])).length;
  const suppBar=d('div','padding:10px 0;');
  suppBar.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:10px;color:#4b5563;">SUPPLEMENTS TODAY</span><span style="font-size:11px;font-weight:700;color:${suppDone===SUPPS.length?'#22c55e':'#94a3b8'};">${suppDone}/${SUPPS.length}</span></div><div style="height:3px;background:#1f2937;border-radius:2px;"><div style="height:100%;width:${Math.round(suppDone/SUPPS.length*100)}%;background:#a78bfa;border-radius:2px;transition:width .3s;"></div></div>`;
  sc2.appendChild(suppBar);
  w.appendChild(sc2);

  // DAILY NUTRITION COMMENT
  const ncCard=mkCard('#475569','DAY NOTES');
  ncCard.querySelector('div').style.marginBottom='10px';
  const ncTa=document.createElement('textarea'); ncTa.className='sn-ta';
  ncTa.placeholder='e.g. Birthday blowout — off plan today / Intentional refeed / Extended fast 20hrs / Strict carnivore / Rehydration day...';
  ncTa.style.minHeight='56px';
  ncTa.value=nut.dayNote||'';

  ncCard.appendChild(ncTa);

  // NUTRITION FEEDBACK BUTTON
  const nfBtn=d('button',`width:100%;background:${S.nutFeedbackLoading?'#090e1a':'#0b1120'};border:1px solid #22d3ee40;border-radius:12px;padding:14px;color:${S.nutFeedbackLoading?'#374151':'#22d3ee'};font-size:13px;font-weight:700;margin-bottom:${S.nutFeedback?'8px':'0'};`);

  if(S.nutFeedback){
    const nfCard=d('div','background:#0b1120;border:1px solid #22d3ee30;border-radius:12px;padding:14px;');

  }
  return w;
}

function mkAddFoodModal(){
  const bg=d('div',''); bg.className='modal-bg';
  bg.onclick=e=>{if(e.target===bg){S.showAddFood=false;render();}};
  const m=d('div',''); m.className='modal';
  const mh=d('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;');
  mh.innerHTML=`<h3 style="font-size:16px;font-weight:700;">Add Food</h3>`;
  const cl=d('button','background:#1f2937;border:none;color:#94a3b8;width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;');
  cl.textContent='×'; cl.onclick=()=>{S.showAddFood=false;render();}; mh.appendChild(cl); m.appendChild(mh);
  // Search
  const si=document.createElement('input'); si.type='text'; si.placeholder='Search foods...';
  si.value=S.foodSearch||'';
  si.style.cssText='width:100%;background:#090e1a;border:1px solid #1f2937;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;margin-bottom:12px;';
  si.addEventListener('input',e=>{S.foodSearch=e.target.value;renderFoodList(m);}); m.appendChild(si);
  // Category filter
  const cats=d('div','display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;');
  FOOD_CATS.forEach(cat=>{
    const b=d('button',''); b.className=`food-chip${S.foodCat===cat?' active':''}`;
    b.textContent=cat; b.onclick=()=>{S.foodCat=cat;renderFoodList(m);}; cats.appendChild(b);
  });
  m.appendChild(cats);
  // Food list container
  const fl=d('div',''); fl.id='food-list'; m.appendChild(fl);
  renderFoodList(m);
  bg.appendChild(m); return bg;
}

function renderFoodList(modal){
  let fl=modal.querySelector('#food-list');
  if(!fl){ fl=d('div',''); fl.id='food-list'; modal.appendChild(fl); }
  fl.innerHTML='';
  const q=(S.foodSearch||'').toLowerCase();
  const filtered=FOODS.filter(f=>{
    const matchCat=S.foodCat==='All'||f.cat===S.foodCat;
    const matchQ=!q||f.name.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  filtered.slice(0,20).forEach(food=>{
    const sel=S.selFood&&S.selFood.name===food.name;
    const isCount=!!food.countMode;
    // Calculate preview values
    const pPer = isCount
      ? Math.round(food.p * S.foodCount)
      : Math.round(food.p * S.foodGrams / 100);
    const kPer = isCount
      ? Math.round(food.k * S.foodCount)
      : Math.round(food.k * S.foodGrams / 100);

    const fi=d('div',''); fi.className=`food-item${sel?' selected':''}`;
    fi.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;font-weight:${sel?700:400};color:${sel?'#22d3ee':'#f1f5f9'};">${food.name}</span>
      <div style="display:flex;gap:6px;font-size:10px;">
        <span style="color:#22c55e;">${isCount?food.p+'g P/'+food.unit:food.p+'g P/100g'}</span>
        ${food.note?`<span style="color:#374151;">${food.note}</span>`:''}
        <span style="color:#475569;font-family:monospace;">${food.cat}</span>
      </div>
    </div>`;

    if(sel){
      const inner=d('div','margin-top:10px;padding-top:10px;border-top:1px solid #1f2937;');

      if(isCount){
        // ── EGG COUNT STEPPER ──
        const countRow=d('div','display:flex;align-items:center;gap:12px;margin-bottom:12px;justify-content:center;');
        const dn=d('button',''); dn.className='step-btn'; dn.textContent='−';
        dn.onclick=e2=>{ e2.stopPropagation(); S.foodCount=Math.max(1,S.foodCount-1); renderFoodList(modal); };
        const val=d('div','min-width:60px;text-align:center;');
        val.innerHTML=`<div style="font-size:28px;font-weight:900;color:#22d3ee;">${S.foodCount}</div><div style="font-size:11px;color:#475569;">${food.unitLabel||food.unit+'s'}</div>`;
        const up=d('button',''); up.className='step-btn'; up.textContent='+';
        up.onclick=e2=>{ e2.stopPropagation(); S.foodCount=Math.min(24,S.foodCount+1); renderFoodList(modal); };
        countRow.appendChild(dn); countRow.appendChild(val); countRow.appendChild(up);
        inner.appendChild(countRow);
      } else {
        // ── GRAMS INPUT ──
        const gr=d('div','display:flex;align-items:center;gap:10px;margin-bottom:12px;');
        const gi=document.createElement('input');
        gi.type='number'; gi.min=1; gi.max=2000; gi.value=S.foodGrams; gi.className='num-inp';
        gi.style.cssText='color:#f97316;border-color:#f9741650;width:90px;font-size:18px;';
        // Stop ALL events bubbling from the input to the food item click handler
        ['click','touchstart','touchend','mousedown','focus','pointerdown'].forEach(ev=>
          gi.addEventListener(ev, e2=>e2.stopPropagation())
        );
        gi.addEventListener('input',e2=>{
          e2.stopPropagation();
          S.foodGrams=parseInt(e2.target.value)||0;
          // Update preview without full re-render so input keeps focus
          const pv2=modal.querySelector('#food-preview');
          if(pv2){
            const p2=Math.round(food.p*S.foodGrams/100);
            const k2=Math.round(food.k*S.foodGrams/100);
            pv2.innerHTML=`<span style="font-size:20px;font-weight:700;color:#22c55e;">+${p2}g protein</span>  <span style="font-size:14px;color:#475569;">${k2} kcal</span>`;
          }
        });
        gi.addEventListener('change',e2=>e2.stopPropagation());
        const gl=d('span','font-size:14px;color:#475569;'); gl.textContent='g cooked weight';
        gr.appendChild(gi); gr.appendChild(gl);
        inner.appendChild(gr);
      }

      // Preview
      const pv=d('div','background:#0a0f1a;border-radius:8px;padding:10px;margin-bottom:10px;text-align:center;');
      pv.id='food-preview';
      pv.innerHTML=`<span style="font-size:20px;font-weight:700;color:#22c55e;">+${pPer}g protein</span>  <span style="font-size:14px;color:#475569;">${kPer} kcal</span>`;
      inner.appendChild(pv);

      const addBtn=d('button','width:100%;background:linear-gradient(135deg,#15803d,#0f766e);border:none;border-radius:10px;padding:12px;color:#fff;font-size:14px;font-weight:700;');
      addBtn.textContent='Add to Log';
      addBtn.onclick=e2=>{
        e2.stopPropagation();
        // Re-read gram input value directly in case preview wasn't re-rendered
        const grInput=pv.parentElement?.querySelector('input[type=number]');
        if(grInput&&!isCount) S.foodGrams=parseInt(grInput.value)||S.foodGrams;
        const currentP = isCount ? Math.round(food.p*S.foodCount) : Math.round(food.p*S.foodGrams/100);
        const currentK = isCount ? Math.round(food.k*S.foodCount) : Math.round(food.k*S.foodGrams/100);
        const displayQty = isCount
          ? `${S.foodCount} ${food.unitLabel||food.unit+'s'}`
          : `${S.foodGrams}g`;
        const entry={
          id:Date.now(), time:timeNow(),
          foodName:`${food.name} (${displayQty})`,
          grams: isCount ? S.foodCount*(food.name.toLowerCase().includes('white')?30:58) : S.foodGrams,
          protein:currentP, calories:currentK,
          displayQty,
        };
        const foods=[...(S.nut.foods||[]),entry];
        S.nut={...S.nut,foods}; saveNut(todayKey(),S.nut); S.showAddFood=false; render();
      };
      inner.appendChild(addBtn);
      inner.onclick=e2=>e2.stopPropagation();
      fi.appendChild(inner);
    }
    fi.onclick=e2=>{ if(!sel){ e2.stopPropagation(); S.selFood=food; S.foodCount=4; renderFoodList(modal); }};
    fl.appendChild(fi);
  });
  if(filtered.length===0){
    const none=d('div','text-align:center;padding:20px;font-size:13px;color:#374151;'); none.textContent='No foods found.'; fl.appendChild(none);
  }
}

    creatine:'5g any time daily. Most important supplement for your surgery situation — reduces muscle loss during immobilisation post-op. Mix into coffee, water, food — anything. Do NOT stop through surgery. Start now if you haven\'t already.',
    zma:'Take on a completely empty stomach or with only a small snack 30-60 min before bed. Food — especially calcium or dairy — significantly reduces zinc and magnesium absorption. Separate from beef liver capsules by 2+ hours. Covers both zinc and magnesium in one supplement.',
    magglycinate:'Check your ZMA label for magnesium content. Use this to top up to ~400mg total elemental magnesium nightly. Glycinate is the most bioavailable and sleep-supportive form. Shift workers particularly benefit — supports circadian rhythm and cortisol regulation.',
    glycine_bed:'3g in water before bed — separate from your pre-training dose. Research shows 3g before bed reduces time to fall asleep and increases slow-wave restorative sleep. Particularly valuable given your shift work and sleep scores of 72-81.',
  };
  if(notes[s.key]){
    const pn=d('div','background:#0a0f1a;border:1px solid #1f2937;border-radius:10px;padding:14px;border-left:3px solid '+s.color+';margin-bottom:10px;');
    pn.innerHTML=`<div style="font-size:9px;color:${s.color};letter-spacing:.15em;font-weight:700;margin-bottom:6px;">PRE-SURGERY PROTOCOL</div><div style="font-size:12px;color:#9ca3af;line-height:1.6;">${notes[s.key]}</div>`;
    m.appendChild(pn);
  }
  // Show timing block
  const timingBox=d('div','background:#090e1a;border-radius:10px;padding:12px 14px;');
  timingBox.innerHTML=`<div style="font-size:9px;color:#475569;letter-spacing:.1em;margin-bottom:4px;">TIMING</div><div style="font-size:13px;color:#e2e8f0;line-height:1.5;">${s.timing}</div>`;
  m.appendChild(timingBox);
  bg.appendChild(m); return bg;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function mkHistory(){
  const w=d('div',''); const dl=daysLeft();
  const hrow=d('div','display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:10px;');
  const htxt=d('div','flex:1;');
  htxt.innerHTML=`<p style="font-size:10px;letter-spacing:.25em;color:#374151;margin-bottom:6px;">TRAINING LOG</p><h2 style="font-size:24px;font-weight:700;">Session History</h2><p style="font-size:11px;color:#4b5563;margin-top:4px;">${S.log.length} entries · ${dl} days to surgery</p>`;
  const btnRow=d('div','display:flex;flex-direction:column;gap:6px;margin-top:4px;flex-shrink:0;');
  const addBtn=d('button','background:linear-gradient(135deg,#1d4ed8,#7c3aed);border:none;border-radius:10px;padding:10px 14px;color:#fff;font-size:11px;font-weight:700;white-space:nowrap;');
  addBtn.textContent='+ Add Entry'; addBtn.onclick=()=>{S.showAddModal=true;render();};
  const expBtn=d('button','background:#0b1120;border:1px solid #1f2937;border-radius:10px;padding:10px 14px;color:#94a3b8;font-size:11px;font-weight:700;white-space:nowrap;');
  expBtn.textContent='↓ Export Log';
  expBtn.onclick=()=>{
    const data=JSON.stringify(S.log,null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`surf_bjj_log_${todayKey()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };
  btnRow.appendChild(addBtn); btnRow.appendChild(expBtn); hrow.appendChild(htxt); hrow.appendChild(btnRow); w.appendChild(hrow);
  // Stats
  if(S.log.length>0){
    const aH=Math.round(S.log.reduce((s,e)=>s+(e.hrv||0),0)/S.log.length);
    const aSl=(S.log.reduce((s,e)=>s+(e.sleepDec||e.sleep||0),0)/S.log.length).toFixed(1);
    const wts=S.log.filter(e=>e.weight&&parseFloat(e.weight)>0);
    const aWt=wts.length?(wts.reduce((s,e)=>s+parseFloat(e.weight),0)/wts.length).toFixed(1):'--';
    const gr=S.log.filter(e=>e.readiness==='GREEN').length;
    const rd=S.log.filter(e=>e.readiness==='RED').length;
    const sg=d('div','display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;');
    [{l:'Avg Sleep',v:`${aSl}h`,c:'#22d3ee'},{l:'Avg HRV',v:`${aH}ms`,c:'#a78bfa'},{l:'Avg Wt',v:`${aWt}kg`,c:'#f97316'},{l:'Green',v:gr,c:'#22c55e'},{l:'Red',v:rd,c:'#ef4444'},{l:'Total',v:S.log.length,c:'#94a3b8'}].forEach(s=>{
      const st=d('div','background:#0b1120;border:1px solid #111827;border-radius:10px;padding:12px;text-align:center;');
      st.innerHTML=`<div style="font-size:18px;font-weight:700;color:${s.c};">${s.v}</div><div style="font-size:9px;color:#374151;letter-spacing:.08em;margin-top:2px;">${s.l.toUpperCase()}</div>`;
      sg.appendChild(st);
    }); w.appendChild(sg);
  }
  const sorted=[...S.log].sort((a,b)=>b.date.localeCompare(a.date));
  const li=d('div','display:grid;gap:8px;');
  sorted.slice(0,40).forEach(e=>{
    const rc=RCOL[e.readiness]||'#475569';
    const isExp=S.expandedLogEntry===e.date;
    const chips=[e.sleepStr||e.sleep+'h',`Score:${e.sleepScore||'?'}`,`RHR:${e.rhr}`,`HRV:${e.hrv}ms`,`E:${e.energy}/10`,e.bodyBattery?`BB:${e.bodyBattery}`:'',e.weight?`${e.weight}kg`:'',e.sessionAvgWatts?`${e.sessionAvgWatts}w`:'',e.sessionAvgHR?`HR:${e.sessionAvgHR}`:'',e.shift,e.gym].filter(Boolean);
    const row=d('div',`background:#0b1120;border:1px solid ${isExp?'#334155':'#111827'};border-radius:10px;padding:14px 16px;position:relative;cursor:pointer;`);
    row.innerHTML=`
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;flex-wrap:wrap;gap:4px;padding-right:48px;">
        <div style="display:flex;gap:8px;align-items:center;"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${rc};box-shadow:0 0 5px ${rc};flex-shrink:0;margin-top:1px;"></span><span style="font-size:13px;font-weight:700;color:#f1f5f9;">${e.session_title||'Session'}</span></div>
        <span style="font-size:10px;color:#374151;font-family:monospace;">${e.date}</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
        ${chips.map(m=>`<span style="font-size:10px;color:#4b5563;background:#0d1117;padding:2px 7px;border-radius:4px;">${m}</span>`).join('')}
      </div>
      ${e.completed?`<div style="font-size:11px;color:#22c55e;margin-bottom:2px;">✓ ${e.completed}</div>`:''}
      <div style="font-size:10px;color:#334155;margin-top:2px;">${isExp?'▲ tap to collapse':'▼ tap to expand'}</div>`;

    // Expanded detail
    if(isExp){
      const expDiv=d('div','margin-top:10px;padding-top:10px;border-top:1px solid #1f2937;');
      if(e.notes) expDiv.innerHTML+=`<div style="font-size:11px;color:#475569;margin-bottom:8px;font-style:italic;">Morning: "${e.notes}"</div>`;
      if(e.postSessionNote){
        const pnDiv=d('div','background:#090e1a;border-radius:8px;padding:10px;margin-bottom:8px;');
        pnDiv.innerHTML=`<div style="font-size:9px;color:#7c3aed;letter-spacing:.15em;font-weight:700;margin-bottom:4px;">SESSION NOTES</div><div style="font-size:12px;color:#94a3b8;line-height:1.6;white-space:pre-wrap;">${e.postSessionNote}</div>`;
        expDiv.appendChild(pnDiv);
      }
      // Block notes
      if(e.blockNotes&&Object.keys(e.blockNotes).some(k=>e.blockNotes[k])){
        const bnDiv=d('div','background:#090e1a;border-radius:8px;padding:10px;margin-bottom:8px;');
        bnDiv.innerHTML=`<div style="font-size:9px;color:#22d3ee;letter-spacing:.15em;font-weight:700;margin-bottom:4px;">BLOCK NOTES</div>`;
        Object.entries(e.blockNotes).forEach(([k,v])=>{ if(v){ const r=d('div','font-size:11px;color:#94a3b8;margin-bottom:3px;'); r.innerHTML=`<span style="color:#374151;">${k}:</span> ${v}`; bnDiv.appendChild(r); }});
        expDiv.appendChild(bnDiv);
      }
      // Custom exercises
      if(e.customExercises&&e.customExercises.length>0){
        const cxDiv=d('div','background:#090e1a;border-radius:8px;padding:10px;margin-bottom:8px;');
        cxDiv.innerHTML=`<div style="font-size:9px;color:#22d3ee;letter-spacing:.15em;font-weight:700;margin-bottom:6px;">ADDITIONAL WORK</div>`;
        e.customExercises.forEach(ex=>{
          const exRow=d('div','font-size:12px;color:#94a3b8;padding:3px 0;border-bottom:1px solid #0d1117;');
          exRow.innerHTML=`<span style="color:#f1f5f9;font-weight:700;">${ex.name||'Exercise'}</span>${ex.sets?` · ${ex.sets}`:''}${ex.load?` · <span style="color:#f59e0b;">${ex.load}</span>`:''}${ex.notes?`<br><span style="font-size:11px;color:#475569;">${ex.notes}</span>`:''}`;
          cxDiv.appendChild(exRow);
        });
        expDiv.appendChild(cxDiv);
      }
      // Conditioning metrics
      if(e.sessionAvgHR||e.sessionAvgWatts){
        const cRow=d('div','display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;');
        if(e.sessionAvgHR){ const c=d('span','font-size:11px;color:#ef4444;background:#ef444414;padding:3px 8px;border-radius:4px;'); c.textContent=`❤ ${e.sessionAvgHR} bpm avg`; cRow.appendChild(c); }
        if(e.sessionAvgWatts){ const c=d('span','font-size:11px;color:#f59e0b;background:#f59e0b14;padding:3px 8px;border-radius:4px;'); c.textContent=`⚡ ${e.sessionAvgWatts}w avg`; cRow.appendChild(c); }
        if(e.sessionPeakWatts){ const c=d('span','font-size:11px;color:#f97316;background:#f9731614;padding:3px 8px;border-radius:4px;'); c.textContent=`⚡ ${e.sessionPeakWatts}w peak`; cRow.appendChild(c); }
        expDiv.appendChild(cRow);
      }
      row.appendChild(expDiv);
    }

    row.onclick=()=>{ S.expandedLogEntry=isExp?null:e.date; render(); };
    const del=d('button','position:absolute;top:12px;right:12px;background:transparent;border:none;color:#374151;font-size:16px;padding:2px 6px;');
    del.textContent='✕'; del.onclick=ev=>{ev.stopPropagation();if(confirm('Delete?')){S.log=S.log.filter(x=>x!==e);saveLog();render();}};
    row.appendChild(del); li.appendChild(row);
  });
  w.appendChild(li);
  if(S.log.length>0){
    const cl=d('button','margin-top:20px;background:transparent;border:1px solid #1f2937;color:#4b5563;padding:10px 20px;border-radius:8px;font-size:11px;');
    cl.textContent='Clear all history';
    cl.onclick=()=>{if(confirm('Clear ALL history? Cannot be undone.')){S.log=[];saveLog();render();}};
    w.appendChild(cl);
  }
  return w;
}

  ['All','BJJ','Surf'].forEach(f=>{
    const a=(S.journalFilter||'All')===f;
    const b=d('button',`background:${a?'#1e293b':'#090e1a'};border:1px solid ${a?'#334155':'#1f2937'};color:${a?'#e2e8f0':'#4b5563'};padding:7px 16px;border-radius:20px;font-size:11px;font-weight:${a?700:400};`);
    b.textContent=f; b.onclick=()=>{S.journalFilter=f;render();}; ftabs.appendChild(b);
  });
  w.appendChild(ftabs);

  const filter=S.journalFilter||'All';
  const filtered=[...S.journal].filter(e=>filter==='All'||e.type===filter.toLowerCase()).sort((a,b)=>b.date.localeCompare(a.date));

  filtered.forEach(entry=>{
    const isBJJ=entry.type==='bjj';
    const ac=isBJJ?'#ef4444':'#0ea5e9';
    const card=d('div',`background:#0b1120;border:1px solid #111827;border-top:3px solid ${ac};border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;position:relative;`);
    // Header
    const ch=d('div','display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;padding-right:24px;');
    ch.innerHTML=`<div><div style="display:flex;gap:8px;align-items:center;margin-bottom:3px;"><span style="font-size:16px;">${isBJJ?'🥋':'🌊'}</span><span style="font-size:13px;font-weight:700;color:#f1f5f9;">${entry.location||'Session'}</span></div><span style="font-size:10px;color:#374151;font-family:monospace;">${entry.date}</span></div>`;
    card.appendChild(ch);
    // Preview chips
    const chips=d('div','display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;');
    if(isBJJ){
      if(entry.techniques&&entry.techniques.length) chips.innerHTML+=`<span style="font-size:10px;color:${ac};background:${ac}18;padding:2px 8px;border-radius:4px;">${entry.techniques.length} technique${entry.techniques.length>1?'s':''}</span>`;
      if(entry.rounds&&entry.rounds.length){
        const w2=entry.rounds.filter(r=>r.result==='Win').length, l=entry.rounds.filter(r=>r.result==='Loss').length;
        chips.innerHTML+=`<span style="font-size:10px;color:#22c55e;background:#22c55e18;padding:2px 8px;border-radius:4px;">${w2}W / ${l}L</span>`;
      }
      if(entry.drillNext) chips.innerHTML+=`<span style="font-size:10px;color:#a78bfa;background:#a78bfa18;padding:2px 8px;border-radius:4px;">Drill: ${entry.drillNext.slice(0,30)}${entry.drillNext.length>30?'...':''}</span>`;
    } else {
      if(entry.swellSize) chips.innerHTML+=`<span style="font-size:10px;color:${ac};background:${ac}18;padding:2px 8px;border-radius:4px;">${entry.swellSize}</span>`;
      if(entry.wind)      chips.innerHTML+=`<span style="font-size:10px;color:#94a3b8;background:#1e293b;padding:2px 8px;border-radius:4px;">${entry.wind}</span>`;
      if(entry.rating)    chips.innerHTML+=`<span style="font-size:10px;color:#f59e0b;background:#f59e0b18;padding:2px 8px;border-radius:4px;">${entry.rating}/10</span>`;
      if(entry.board)     chips.innerHTML+=`<span style="font-size:10px;color:#475569;background:#1e293b;padding:2px 8px;border-radius:4px;">${entry.board}</span>`;
    }
    card.appendChild(chips);
    if(entry.sessionNotes){
      const sn=d('div','font-size:11px;color:#475569;line-height:1.5;font-style:italic;');
      sn.textContent=`"${entry.sessionNotes.slice(0,120)}${entry.sessionNotes.length>120?'...':''}"`;
      card.appendChild(sn);
    }
    card.onclick=()=>{S.journalViewEntry=entry;render();};
    // Delete
    const del=d('button','position:absolute;top:12px;right:12px;background:transparent;border:none;color:#374151;font-size:16px;padding:2px 6px;');
    del.textContent='✕'; del.onclick=e2=>{e2.stopPropagation();if(confirm('Delete this journal entry?')){S.journal=S.journal.filter(x=>x!==entry);saveJournal();render();}};
    card.appendChild(del); w.appendChild(card);
  });
  return w;
}

// ── JOURNAL ENTRY VIEW MODAL ──────────────────────────────────────────────────
function mkJournalView(){
  const e=S.journalViewEntry;
  const isBJJ=e.type==='bjj';
  const ac=isBJJ?'#ef4444':'#0ea5e9';
  const bg=d('div',''); bg.className='modal-bg';
  bg.onclick=ev=>{if(ev.target===bg){S.journalViewEntry=null;render();}};
  const m=d('div',''); m.className='modal';

  // Header
  const mh=d('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;');
  mh.innerHTML=`<div><div style="font-size:18px;margin-bottom:2px;">${isBJJ?'🥋':'🌊'} <strong>${e.location||'Session'}</strong></div><div style="font-size:11px;color:#374151;font-family:monospace;">${e.date}</div></div>`;
  const cl=d('button','background:#1f2937;border:none;color:#94a3b8;width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;');
  cl.textContent='×'; cl.onclick=()=>{S.journalViewEntry=null;render();}; mh.appendChild(cl); m.appendChild(mh);

  if(isBJJ){
    // Techniques
    if(e.techniques&&e.techniques.length){
      const tc=d('div','margin-bottom:18px;');
      tc.innerHTML=`<div style="font-size:10px;color:${ac};letter-spacing:.2em;font-weight:700;margin-bottom:10px;">TECHNIQUES DRILLED</div>`;
      e.techniques.forEach((t,i)=>{
        const tb=d('div','background:#090e1a;border:1px solid #1f2937;border-radius:10px;padding:12px;margin-bottom:8px;');
        tb.innerHTML=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;"><span style="font-size:12px;font-weight:700;color:#f1f5f9;">${i+1}. ${t.name||'Technique'}</span><span style="font-size:10px;color:${ac};background:${ac}18;padding:1px 7px;border-radius:4px;">${t.position}</span></div>${t.keySteps?`<div style="font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:${t.notes?'6px':'0'};white-space:pre-wrap;">${t.keySteps}</div>`:''}${t.notes?`<div style="font-size:11px;color:#475569;font-style:italic;">${t.notes}</div>`:''}`;
        tc.appendChild(tb);
      });
      m.appendChild(tc);
    }
    // Sparring rounds
    if(e.rounds&&e.rounds.some(r=>r.partner||r.submission||r.notes)){
      const rc=d('div','margin-bottom:18px;');
      rc.innerHTML=`<div style="font-size:10px;color:#a78bfa;letter-spacing:.2em;font-weight:700;margin-bottom:10px;">SPARRING ROUNDS</div>`;
      const summary=d('div','display:flex;gap:10px;margin-bottom:10px;');
      const wins=e.rounds.filter(r=>r.result==='Win').length;
      const losses=e.rounds.filter(r=>r.result==='Loss').length;
      const tech=e.rounds.filter(r=>r.result==='Technique').length;
      summary.innerHTML=`<span style="font-size:13px;color:#22c55e;font-weight:700;">${wins}W</span><span style="font-size:13px;color:#ef4444;font-weight:700;">${losses}L</span>${tech?`<span style="font-size:13px;color:#94a3b8;font-weight:700;">${tech} Tech</span>`:''}`;
      rc.appendChild(summary);
      e.rounds.forEach((r,i)=>{
        const rCol=r.result==='Win'?'#22c55e':r.result==='Loss'?'#ef4444':'#94a3b8';
        const rb=d('div','background:#090e1a;border:1px solid #1f2937;border-radius:8px;padding:10px 12px;margin-bottom:6px;');
        rb.innerHTML=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:${r.submission||r.notes?'5px':'0'};"><span style="font-size:11px;color:#475569;">Round ${i+1}</span>${r.partner?`<span style="font-size:11px;color:#94a3b8;">vs ${r.partner}</span>`:''}${r.duration?`<span style="font-size:10px;color:#374151;">${r.duration}</span>`:''}<span style="font-size:11px;font-weight:700;color:${rCol};">${r.result}</span>${r.submission?`<span style="font-size:10px;color:#f59e0b;background:#f59e0b18;padding:1px 7px;border-radius:4px;">${r.submission}</span>`:''}</div>${r.notes?`<div style="font-size:11px;color:#475569;font-style:italic;">${r.notes}</div>`:''}`;
        rc.appendChild(rb);
      });
      m.appendChild(rc);
    }
    // Drill next
    if(e.drillNext){
      const dn=d('div','background:#090e1a;border:1px solid #a78bfa40;border-radius:10px;padding:12px;margin-bottom:14px;');
      dn.innerHTML=`<div style="font-size:9px;color:#a78bfa;letter-spacing:.2em;font-weight:700;margin-bottom:5px;">DRILL NEXT SESSION</div><div style="font-size:13px;color:#e2e8f0;">${e.drillNext}</div>`;
      m.appendChild(dn);
    }
  } else {
    // Surf details
    const conds=d('div','display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;');
    [{l:'Location',v:e.location},{l:'Swell',v:`${e.swellSize||'?'} ${e.swellDir||''}`.trim()},{l:'Wind',v:e.wind},{l:'Tide',v:e.tide},{l:'Board',v:e.board},{l:'Rating',v:e.rating?`${e.rating}/10`:''}].filter(x=>x.v).forEach(x=>{
      const c=d('div','background:#090e1a;border:1px solid #1f2937;border-radius:8px;padding:10px;');
      c.innerHTML=`<div style="font-size:9px;color:#475569;letter-spacing:.1em;margin-bottom:3px;">${x.l.toUpperCase()}</div><div style="font-size:14px;font-weight:700;color:#f1f5f9;">${x.v}</div>`;
      conds.appendChild(c);
    });
    m.appendChild(conds);
    if(e.sessionFocus){
      const sf=d('div','background:#090e1a;border-left:3px solid #0ea5e9;border-radius:0 10px 10px 0;padding:12px;margin-bottom:10px;');
      sf.innerHTML=`<div style="font-size:9px;color:#0ea5e9;letter-spacing:.2em;font-weight:700;margin-bottom:4px;">SESSION FOCUS</div><div style="font-size:13px;color:#e2e8f0;">${e.sessionFocus}</div>`;
      m.appendChild(sf);
    }
    if(e.wentWell){
      const gd=d('div','background:#052e16;border:1px solid #14532d;border-radius:10px;padding:12px;margin-bottom:8px;');
      gd.innerHTML=`<div style="font-size:9px;color:#22c55e;letter-spacing:.2em;font-weight:700;margin-bottom:4px;">✓ WHAT WENT WELL</div><div style="font-size:13px;color:#e2e8f0;line-height:1.6;">${e.wentWell}</div>`;
      m.appendChild(gd);
    }
    if(e.workOn){
      const wo=d('div','background:#1a0a0a;border:1px solid #7f1d1d;border-radius:10px;padding:12px;margin-bottom:8px;');
      wo.innerHTML=`<div style="font-size:9px;color:#f59e0b;letter-spacing:.2em;font-weight:700;margin-bottom:4px;">→ WORK ON</div><div style="font-size:13px;color:#e2e8f0;line-height:1.6;">${e.workOn}</div>`;
      m.appendChild(wo);
    }
  }

  // Session notes
  if(e.sessionNotes){
    const sn=d('div','background:#090e1a;border:1px solid #1f2937;border-radius:10px;padding:12px;margin-bottom:14px;');
    sn.innerHTML=`<div style="font-size:9px;color:#475569;letter-spacing:.2em;font-weight:700;margin-bottom:4px;">SESSION NOTES</div><div style="font-size:12px;color:#94a3b8;line-height:1.6;white-space:pre-wrap;">${e.sessionNotes}</div>`;
    m.appendChild(sn);
  }

  // Edit button
  const eb=d('button','width:100%;background:transparent;border:1px solid #1f2937;border-radius:10px;padding:12px;color:#94a3b8;font-size:13px;font-weight:700;margin-bottom:8px;');
  eb.textContent='Edit Entry';
  eb.onclick=()=>{S.jForm=JSON.parse(JSON.stringify(e));S.journalViewEntry=null;S.showJournalModal=true;render();};
  m.appendChild(eb);

  // Journal feedback button
  const jfBtn=d('button',`width:100%;background:${S.journalFeedbackLoading?'#090e1a':'#0b1120'};border:1px solid ${isBJJ?'#ef444440':'#0ea5e940'};border-radius:10px;padding:12px;color:${S.journalFeedbackLoading?'#374151':isBJJ?'#ef4444':'#0ea5e9'};font-size:13px;font-weight:700;margin-bottom:${S.journalFeedback&&S.showJournalFeedbackFor===e.date?'10px':'0'};`);
  jfBtn.textContent=S.journalFeedbackLoading&&S.showJournalFeedbackFor===e.date?'⏳  Analysing...':'💬 Get Coach Feedback';
  jfBtn.onclick=()=>genJournalFeedback(e);
  m.appendChild(jfBtn);

  if(S.journalFeedback&&S.showJournalFeedbackFor===e.date){
    const jfCard=d('div','background:#090e1a;border-left:3px solid #a78bfa;border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:8px;');
    jfCard.innerHTML=`<div style="font-size:9px;color:#a78bfa;letter-spacing:.2em;font-weight:700;margin-bottom:6px;">COACH FEEDBACK</div><div style="font-size:12px;color:#94a3b8;line-height:1.6;white-space:pre-wrap;">${S.journalFeedback}</div>`;
    m.appendChild(jfCard);
  }

  bg.appendChild(m); return bg;
}

// ── JOURNAL ADD/EDIT MODAL ────────────────────────────────────────────────────
function mkJournalModal(){
  const f=S.jForm;
  const isBJJ=f.type==='bjj';
  const ac=isBJJ?'#ef4444':'#0ea5e9';
  const bg=d('div',''); bg.className='modal-bg';
  bg.onclick=ev=>{if(ev.target===bg){S.showJournalModal=false;render();}};
  const m=d('div',''); m.className='modal';

  const mh=d('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;');
  mh.innerHTML=`<h3 style="font-size:16px;font-weight:700;color:${ac};">${isBJJ?'🥋 BJJ Journal':'🌊 Surf Journal'}</h3>`;
  const cl=d('button','background:#1f2937;border:none;color:#94a3b8;width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;');
  cl.textContent='×'; cl.onclick=()=>{S.showJournalModal=false;render();}; mh.appendChild(cl); m.appendChild(mh);

  // Date
  m.appendChild(secLbl('DATE'));
  const di=document.createElement('input'); di.type='date'; di.value=f.date;
  di.style.cssText='width:100%;background:#090e1a;border:1px solid #1f2937;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;margin-bottom:14px;';
  di.addEventListener('change',ev=>{f.date=ev.target.value;}); m.appendChild(di);

  // Location
  m.appendChild(secLbl(isBJJ?'ACADEMY / LOCATION':'BREAK / LOCATION'));
  const li2=document.createElement('input'); li2.type='text';
  li2.placeholder=isBJJ?'e.g. Gold Coast BJJ, Open mat...':'e.g. Snapper Rocks, Greenmount...';
  li2.value=f.location||'';
  li2.style.cssText='width:100%;background:#090e1a;border:1px solid #1f2937;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:13px;margin-bottom:14px;';
  li2.addEventListener('input',ev=>{f.location=ev.target.value;}); m.appendChild(li2);

  if(isBJJ){
    // Techniques section
    m.appendChild(secLbl('TECHNIQUES DRILLED'));
    const techWrap=d('div','margin-bottom:6px;'); m.appendChild(techWrap);
    function renderTechniques(){
      techWrap.innerHTML='';
      (f.techniques||[]).forEach((t,i)=>{
        const tb=d('div','background:#090e1a;border:1px solid #1f2937;border-radius:10px;padding:12px;margin-bottom:8px;');
        const tRow=d('div','display:flex;gap:8px;margin-bottom:8px;align-items:center;');
        const tn=document.createElement('input'); tn.type='text'; tn.placeholder='Technique name...'; tn.value=t.name||'';
        tn.style.cssText='flex:1;background:#0a0f1a;border:1px solid #1f2937;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:13px;font-weight:700;';
        tn.addEventListener('input',ev=>{t.name=ev.target.value;});
        const delT=d('button','background:transparent;border:none;color:#374151;font-size:16px;padding:2px 6px;');
        delT.textContent='✕'; delT.onclick=()=>{f.techniques.splice(i,1);renderTechniques();};
        tRow.appendChild(tn); tRow.appendChild(delT); tb.appendChild(tRow);
        // Position select
        const ps=d('div','display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;');
        BJJ_POSITIONS.forEach(pos=>{
          const a=t.position===pos;
          const b=d('button',`background:${a?ac+'22':'#0a0f1a'};border:1px solid ${a?ac:'#1f2937'};color:${a?ac:'#475569'};padding:4px 10px;border-radius:14px;font-size:10px;font-weight:${a?700:400};`);
          b.textContent=pos; b.onclick=()=>{t.position=pos;renderTechniques();}; ps.appendChild(b);
        });
        tb.appendChild(ps);
        // Key steps
        const ks=document.createElement('textarea'); ks.className='sn-ta'; ks.style.minHeight='72px'; ks.style.fontSize='12px';
        ks.placeholder='Key steps / details to remember...\n1. ...\n2. ...\n3. ...';
        ks.value=t.keySteps||''; ks.addEventListener('input',ev=>{t.keySteps=ev.target.value;});
        tb.appendChild(ks);
        // Notes
        const nt=document.createElement('input'); nt.type='text'; nt.placeholder='Setup, common mistake, tips...';
        nt.value=t.notes||''; nt.style.cssText='width:100%;background:#0a0f1a;border:1px solid #1f2937;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:11px;margin-top:6px;';
        nt.addEventListener('input',ev=>{t.notes=ev.target.value;}); tb.appendChild(nt);
        techWrap.appendChild(tb);
      });
      const addT=d('button','width:100%;background:#090e1a;border:1px dashed #1f2937;border-radius:8px;padding:10px;color:#475569;font-size:12px;margin-bottom:14px;');
      addT.textContent='+ Add Technique';
      addT.onclick=()=>{f.techniques.push({name:'',position:'Guard',keySteps:'',notes:''});renderTechniques();};
      techWrap.appendChild(addT);
    }
    renderTechniques();

    // Sparring rounds
    m.appendChild(secLbl('SPARRING ROUNDS'));
    const roundWrap=d('div','margin-bottom:6px;'); m.appendChild(roundWrap);
    function renderRounds(){
      roundWrap.innerHTML='';
      (f.rounds||[]).forEach((r,i)=>{
        const rb=d('div','background:#090e1a;border:1px solid #1f2937;border-radius:10px;padding:12px;margin-bottom:8px;');
        rb.innerHTML=`<div style="font-size:10px;color:#a78bfa;letter-spacing:.1em;font-weight:700;margin-bottom:8px;">ROUND ${i+1}</div>`;
        // Partner + Duration row
        const pRow=d('div','display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;');
        const pi=document.createElement('input'); pi.type='text'; pi.placeholder='Partner (optional)'; pi.value=r.partner||'';
        pi.style.cssText='background:#0a0f1a;border:1px solid #1f2937;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:12px;';
        pi.addEventListener('input',ev=>{r.partner=ev.target.value;});
        const dur=document.createElement('input'); dur.type='text'; dur.placeholder='Duration e.g. 5min'; dur.value=r.duration||'';
        dur.style.cssText='background:#0a0f1a;border:1px solid #1f2937;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:12px;';
        dur.addEventListener('input',ev=>{r.duration=ev.target.value;});
        pRow.appendChild(pi); pRow.appendChild(dur); rb.appendChild(pRow);
        // Result
        const resRow=d('div','display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;');
        ['Win','Loss','Draw','Technique'].forEach(res=>{
          const a=r.result===res;
          const col=res==='Win'?'#22c55e':res==='Loss'?'#ef4444':res==='Draw'?'#f59e0b':'#94a3b8';
          const b=d('button',`background:${a?col+'22':'#0a0f1a'};border:1px solid ${a?col:'#1f2937'};color:${a?col:'#475569'};padding:5px 12px;border-radius:14px;font-size:11px;font-weight:${a?700:400};`);
          b.textContent=res; b.onclick=()=>{r.result=res;renderRounds();}; resRow.appendChild(b);
        });
        rb.appendChild(resRow);
        // Submission
        const si2=document.createElement('input'); si2.type='text'; si2.placeholder='Submission used or caught (if any)'; si2.value=r.submission||'';
        si2.style.cssText='width:100%;background:#0a0f1a;border:1px solid #1f2937;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:12px;margin-bottom:6px;';
        si2.addEventListener('input',ev=>{r.submission=ev.target.value;}); rb.appendChild(si2);
        // Round notes
        const rn=document.createElement('input'); rn.type='text'; rn.placeholder='Notes — what worked, what got you, key moments...'; rn.value=r.notes||'';
        rn.style.cssText='width:100%;background:#0a0f1a;border:1px solid #1f2937;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:11px;';
        rn.addEventListener('input',ev=>{r.notes=ev.target.value;});
        rb.appendChild(rn);
        // Delete round
        const delR=d('button','width:100%;background:transparent;border:none;color:#374151;font-size:11px;padding:6px;margin-top:6px;');
        delR.textContent='Remove round'; delR.onclick=()=>{f.rounds.splice(i,1);renderRounds();};
        rb.appendChild(delR); roundWrap.appendChild(rb);
      });
      const addR=d('button','width:100%;background:#090e1a;border:1px dashed #1f2937;border-radius:8px;padding:10px;color:#475569;font-size:12px;margin-bottom:14px;');
      addR.textContent='+ Add Round';
      addR.onclick=()=>{f.rounds.push({partner:'',duration:'',result:'Win',submission:'',notes:''});renderRounds();};
      roundWrap.appendChild(addR);
    }
    renderRounds();

    // Drill next
    m.appendChild(secLbl('DRILL NEXT SESSION'));
    const dn2=document.createElement('input'); dn2.type='text';
    dn2.placeholder='What to focus on or drill next time...'; dn2.value=f.drillNext||'';
    dn2.style.cssText='width:100%;background:#090e1a;border:1px solid #1f2937;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:13px;margin-bottom:14px;';
    dn2.addEventListener('input',ev=>{f.drillNext=ev.target.value;}); m.appendChild(dn2);

  } else {
    // SURF FIELDS
    // Conditions grid
    m.appendChild(secLbl('CONDITIONS'));
    const cGrid=d('div','display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;');

async function genPlan(){

  clearPlan(); // clear any saved plan before generating new one

  const sd=sleepDec(S.sleepH,S.sleepM),ss=sleepStr(S.sleepH,S.sleepM),gb=garminBand(S.sleepScore),shift=SHIFTS.find(x=>x.label===S.shift);
  const msg=`Today's check-in:
- Sleep: ${ss} (${sd.toFixed(2)}h) | Garmin score: ${S.sleepScore}/100 — ${gb.label}
- RHR: ${S.rhr}bpm | HRV: ${S.hrv}ms | Body Battery: ${S.bodyBattery||'not recorded'} | Stress: ${S.stress||'not recorded'} | Resp rate: ${S.respRate||'not recorded'}

- Surf today: ${S.surf?'Yes':'No'} | BJJ today: ${S.bjj?'Yes':'No'}
${S.notes?`- Morning notes: ${S.notes}`:''}
Generate today's optimal training plan.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1800,system:sysPrompt(),messages:[{role:'user',content:msg}]})});
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    const text=(data.content||[]).map(b=>b.text||'').join('');
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    S.plan=parsed;
    S.log=[...S.log.filter(e=>e.date!==todayKey()),{date:todayKey(),sleepH:S.sleepH,sleepM:S.sleepM,sleepDec:sd,sleepStr:ss,sleepScore:S.sleepScore,rhr:S.rhr,hrv:S.hrv,energy:S.energy,bodyBattery:S.bodyBattery,stress:S.stress,respRate:S.respRate,weight:S.weight,shift:S.shift,gym:S.gym,surf:S.surf,bjj:S.bjj,readiness:parsed.readiness,readiness_score:parsed.readiness_score,session_title:parsed.session_title,completed:null,notes:S.notes}];
    saveLog();
    savePlan(parsed); // persist plan so it survives refresh
    // Auto-generate rolling summary if sessions have grown beyond 30
    if(S.log.length>30) maybeGenerateSummary();
    S.screen='plan';
  }catch(err){ S.error=err.message||String(err); }
  S.loading=false; render();
}

// ── AUTO SUMMARY ──────────────────────────────────────────────────────────────
// Called after saveLog — if we have >30 sessions, condense the oldest into a summary
async function maybeGenerateSummary(){
  if(S.log.length<=30) return;
  // Sessions that have fallen outside the 30-session window
  const toSummarise=S.log.slice(0,-30);
  // Check if we already have a summary covering these dates
  const oldestInWindow=S.log.slice(-30)[0]?.date||'';
  const alreadySummarised=S.summaries.some(s=>s.upToDate>=oldestInWindow);
  if(alreadySummarised||toSummarise.length===0) return;

  const fromDate=toSummarise[0].date;
  const toDate=toSummarise[toSummarise.length-1].date;
  const logText=toSummarise.map(e=>
    `${e.date}: ${e.session_title||'?'} | HRV:${e.hrv}ms RHR:${e.rhr} Sleep:${e.sleepStr||'?'} E:${e.energy}/10 Wt:${e.weight||'?'}kg | ${e.postSessionNote?.slice(0,150)||''}`
  ).join('\n');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:400,
        system:'You are an S&C coach. Summarise the following training sessions into a concise 3-5 sentence paragraph capturing: key strength progressions, injury/rehab status trends, readiness patterns, volume and load highlights, and any notable events. Be specific with numbers. Output plain text only — no markdown, no headings.',
        messages:[{role:'user',content:`Summarise these sessions (${fromDate} to ${toDate}):\n${logText}`}]
      })
    });
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.text||'').join('').trim();
    if(text){
      S.summaries=[...S.summaries,{dateRange:`${fromDate} to ${toDate}`,upToDate:toDate,text,generatedAt:todayKey()}];
      saveSummaries();
    }
  }catch(err){ console.error('Summary generation failed:',err); }
}

async function genGoalUpdate(){
  if(!S.goalText?.trim()){ S.goalError='Please describe what has changed or your new goal.'; render(); return; }
  S.goalLoading=true; S.goalError=null; render();

  const recentLog=S.log.slice(-30).map(e=>
    `${e.date}: ${e.session_title||'?'} HRV:${e.hrv}ms RHR:${e.rhr} E:${e.energy}/10 Wt:${e.weight||'?'}kg | ${e.postSessionNote?.slice(0,150)||''}`
  ).join('\n');

  const summaryText=S.summaries.map(s=>`${s.dateRange}: ${s.text}`).join('\n');

  const sys=`You are an elite S&C coach. An athlete is updating their training program goal or context. Read their full history and generate a comprehensive program context block that will guide all future training prescriptions. Be specific about: new phase/focus, load adjustments, exercise modifications, injury considerations, timeline, and what to prioritise vs deprioritise. Output plain text only — concise but thorough, 8-15 sentences. No markdown.`;

  const msg=`ATHLETE UPDATE: "${S.goalText}"

RECENT HISTORY (last 30 sessions):
${recentLog}

${summaryText?'HISTORICAL SUMMARY:\n'+summaryText:''}

Based on this update and full history, generate a new program context that will guide all future daily plans.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:sys,messages:[{role:'user',content:msg}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const context=(data.content||[]).map(b=>b.text||'').join('').trim();
    const entry={date:todayKey(),trigger:S.goalText.trim(),context};
    S.programs=[...S.programs,entry];
    savePrograms();
    S.goalText=''; S.showGoalModal=false;
  }catch(err){
    S.goalError='Could not generate program update. Check internet connection.';
    console.error(err);
  }
  S.goalLoading=false; render();
}

async function analysePhoto(){
  if(!S.photoBase64&&!S.photoDesc?.trim()){alert('Please take a photo or add a description first.');return;}
  S.photoAnalysisLoading=true;render();
  const sys=`You are a sports nutritionist estimating macros from a food photo or description for a carnivore/animal-based athlete. Be practical and honest about uncertainty. Respond with valid JSON only, no markdown, no backticks: {"description":"brief name","protein":"grams as number","calories":"number","fat":"grams as number","carbs":"grams as number","notes":"1-2 sentences on confidence and assumptions","confidence":"high|medium|low"}`;
  const userText=S.photoDesc?`Estimate macros. Description: "${S.photoDesc}".`:`Estimate macros from the photo.`;
  const content=S.photoBase64
    ?[{type:'image',source:{type:'base64',media_type:S.photoMime||'image/jpeg',data:S.photoBase64}},{type:'text',text:userText}]
    :[{type:'text',text:`Food description: "${S.photoDesc}". No photo — estimate from description alone.`}];
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:sys,messages:[{role:'user',content}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const text=(data.content||[]).map(b=>b.text||'').join('').trim();
    S.photoAnalysisResult=JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(err){S.photoAnalysisResult={description:'Analysis failed',protein:'?',calories:'?',fat:'?',carbs:'?',notes:'Error: '+err.message,confidence:'low'};}
  S.photoAnalysisLoading=false;render();
}

      row.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:13px;font-weight:700;color:#f1f5f9;">${isToday?'Today — ':''}${date}</span>
        <span style="font-size:11px;font-weight:700;color:${pCol};">${dayP}g protein</span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <span style="font-size:10px;color:#475569;">${dayK} kcal</span>
        ${suppCount?`<span style="font-size:10px;color:#a78bfa;">${suppCount}/${SUPPS.length} supps</span>`:''}
        ${dayNut.dayNote?`<span style="font-size:10px;color:#475569;font-style:italic;">"${dayNut.dayNote.slice(0,40)}${dayNut.dayNote.length>40?'...':''}"</span>`:''}
      </div>
      <div style="height:3px;background:#1f2937;border-radius:2px;margin-top:8px;"><div style="height:100%;width:${pPct}%;background:${pCol};border-radius:2px;"></div></div>`;
      row.onclick=()=>{S.foodHistoryDate=date;render();};
      m.appendChild(row);
    });
  }

  bg.appendChild(m); return bg;
}

render();
</script>
</body>
</html>
